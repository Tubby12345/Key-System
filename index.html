<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tubby Key System</title>
    <style>
        body {
            background-color: #0b050f;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background-color: #10091A;
            border: 1px solid #1D122D;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #9B2BFF;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .key-box {
            background-color: #1F1332;
            border: 1px solid #2D1C48;
            padding: 15px;
            font-size: 20px;
            border-radius: 8px;
            letter-spacing: 2px;
            margin-bottom: 20px;
            word-break: break-all;
            color: #E0DCE6;
        }
        .copy-btn {
            background-color: #9B2BFF;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
            font-weight: bold;
        }
        .copy-btn:hover {
            background-color: #7120BA;
        }
        p {
            color: #8A7E9C;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Tubby Key System</h1>
    <p style="margin-bottom: 20px;">Paste your HWID below to get your Daily HWID-Locked Key!</p>
    
    <input type="text" id="hwidInput" class="hwid-input" placeholder="Paste HWID here (Ctrl+V)" style="width: 100%; padding: 12px; margin-bottom: 20px; box-sizing: border-box; border-radius: 6px; border: 1px solid #9B2BFF; background: #1F1332; color: white; font-size: 16px; text-align: center;">
    
    <button class="copy-btn" onclick="generateKey()" id="generateBtn" style="margin-bottom: 20px;">Generate Key</button>
    
    <div class="key-box" id="keyDisplay" style="display: none;">Your key will appear here.</div>
    
    <button class="copy-btn" onclick="copyKey()" id="copyBtn" style="display: none;">Copy Key</button>
</div>

<script>
    async function getDailyKey(hwid) {
        // Matches C# string exactly
        const date = new Date().toISOString().split('T')[0];
        const message = hwid + date + "TubbyAdsSecret123!";
        
        const msgUint8 = new TextEncoder().encode(message);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        
        return "TUBBY-" + hashHex.substring(0, 10).toUpperCase();
    }

    async function generateKey() {
        const hwid = document.getElementById("hwidInput").value.trim();
        
        if (!hwid || hwid.length < 5) {
            document.getElementById("keyDisplay").innerText = "Please paste a valid HWID first!";
            document.getElementById("keyDisplay").style.color = "#FF5252";
            document.getElementById("keyDisplay").style.display = "block";
            return;
        }

        const key = await getDailyKey(hwid);
        
        const display = document.getElementById("keyDisplay");
        display.innerText = key;
        display.style.color = "#E0DCE6";
        display.style.display = "block";
        document.getElementById("copyBtn").style.display = "block";
    }

    function copyKey() {
        const key = document.getElementById("keyDisplay").innerText;
        navigator.clipboard.writeText(key).then(() => {
            const btn = document.getElementById("copyBtn");
            btn.innerText = "Copied!";
            btn.style.backgroundColor = "#4CAF50";
            setTimeout(() => {
                btn.innerText = "Copy Key";
                btn.style.backgroundColor = "#9B2BFF";
            }, 2000);
        });
    }
</script>

</body>
</html>

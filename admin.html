<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tubby Management - Firebase Tracker</title>
    <!-- Modern premium font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #09090b;
            --surface: rgba(24, 24, 27, 0.6);
            --surface-glass: rgba(39, 39, 42, 0.4);
            --primary: #3b82f6; /* Changed to Blue to match modern DB trackers */
            --primary-hover: #2563eb;
            --danger: #e11d48;
            --success: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.08);
            --radius-lg: 16px;
            --radius-md: 10px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 85% 30%, rgba(147, 51, 234, 0.08) 0%, transparent 40%);
            background-attachment: fixed;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* HEADER */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #3b82f6, #9333ea);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4);
        }

        .brand-text h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
        .brand-text p { font-size: 13px; color: var(--text-muted); }

        .header-actions { display: flex; gap: 12px; }

        /* BUTTONS */
        .btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s ease;
            color: white;
            outline: none;
        }
        
        .btn:active { transform: scale(0.96); }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #1d4ed8);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }
        .btn-primary:hover { opacity: 0.9; box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4); }

        .btn-outline {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
        }
        .btn-outline:hover { background: rgba(255, 255, 255, 0.08); }

        .btn-danger { background-color: rgba(225, 29, 72, 0.1); color: var(--danger); border: 1px solid rgba(225, 29, 72, 0.2); }
        .btn-danger:hover { background-color: var(--danger); color: white; }
        
        .btn-success { background-color: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); }
        .btn-success:hover { background-color: var(--success); color: white; }

        /* TABS */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .tab {
            padding: 10px 20px;
            background: rgba(255,255,255,0.03);
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 600;
            border: 1px solid transparent;
            color: var(--text-muted);
            transition: all 0.2s;
        }
        .tab:hover { background: rgba(255,255,255,0.08); }
        .tab.active {
            background: rgba(59, 130, 246, 0.15);
            color: var(--primary);
            border-color: rgba(59, 130, 246, 0.3);
        }

        /* DATA CARDS & GRIDS */
        .card {
            background: var(--surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            overflow: hidden;
            display: none; /* hidden by default, handled by JS tabs */
        }
        .card.active { display: block; animation: fadeIn 0.3s; }

        .toolbar {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            gap: 10px;
        }

        .input-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            color: white;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
            width: 300px;
        }
        .input-box:focus { border-color: var(--primary); }

        /* TABLE STYLES */
        .table-container {
            width: 100%;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        th, td {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
        }
        th {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 600;
            background: rgba(255,255,255,0.02);
        }
        td {
            font-size: 14px;
            white-space: nowrap;
        }
        tr:last-child td { border-bottom: none; }
        
        .row-hover:hover {
            background: rgba(255,255,255,0.02);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-active { background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.2); }
        .status-expired { background: rgba(225, 29, 72, 0.15); color: #fb7185; border: 1px solid rgba(225, 29, 72, 0.2); }
        .status-lifetime { background: rgba(147, 51, 234, 0.15); color: #c084fc; border: 1px solid rgba(147, 51, 234, 0.2); }

        .key-text {
            font-family: monospace;
            color: #e2e8f0;
            background: rgba(0,0,0,0.3);
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }

        .action-cell {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="brand">
                <div class="brand-icon">
                    <i data-lucide="database" style="color: white; width: 24px; height: 24px;"></i>
                </div>
                <div class="brand-text">
                    <h1>Tubby Management</h1>
                    <p id="statusText"><span style="color: var(--success)">●</span> Live - Connected to Firebase</p>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn btn-outline" onclick="fetchData()">
                    <i data-lucide="refresh-cw" style="width: 16px; height: 16px;"></i> Refresh
                </button>
            </div>
        </header>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('keys')" id="tab-keys">Licenses & Users</div>
            <div class="tab" onclick="switchTab('bans')" id="tab-bans">Banned Hardware</div>
        </div>

        <!-- KEYS TAB -->
        <div class="card active" id="view-keys">
            <div class="toolbar">
                <div style="display:flex; gap: 10px;">
                    <input type="text" id="newKeyInput" class="input-box" placeholder="Custom Key Name (e.g. TUBBY-VIP-1)">
                    <button class="btn btn-primary" onclick="createCustomKey()">Create Lifetime License</button>
                </div>
                <span style="color: var(--text-muted); font-size: 14px;">Total: <strong id="totalKeys" style="color:white">0</strong></span>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>License Key</th>
                            <th>Status / Type</th>
                            <th>Target HWID</th>
                            <th>Generated On</th>
                            <th>Expires On</th>
                            <th>Last Login</th>
                            <th style="text-align: right;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="keysTableBody">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- BANS TAB -->
        <div class="card" id="view-bans">
            <div class="toolbar">
                <div style="display:flex; gap: 10px;">
                    <input type="text" id="newBanInput" class="input-box" placeholder="Paste HWID to ban...">
                    <button class="btn btn-danger" onclick="banHardware()">Ban Hardware</button>
                </div>
                <span style="color: var(--text-muted); font-size: 14px;">Total Bans: <strong id="totalBans" style="color:white">0</strong></span>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Hardware ID (HWID)</th>
                            <th>Ban Reason</th>
                            <th>Banned On</th>
                            <th style="text-align: right;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="bansTableBody">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // Init Icons
        lucide.createIcons();

        // Database Configuration
        const DB_URL = "https://tbdb-3562a-default-rtdb.asia-southeast1.firebasedatabase.app";

        let dbKeys = {};
        let dbBans = {};

        // Run on load
        fetchData();
        // Auto-refresh every 30 seconds
        setInterval(fetchData, 30000);

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            
            document.getElementById(`tab-${tab}`).classList.add('active');
            document.getElementById(`view-${tab}`).classList.add('active');
        }

        async function fetchData() {
            try {
                const icon = document.querySelector('header .lucide-refresh-cw');
                if(icon) icon.style.transform = "rotate(180deg)"; // tiny spin anim trigger
                
                const [keysRes, bansRes] = await Promise.all([
                    fetch(`${DB_URL}/keys.json`),
                    fetch(`${DB_URL}/bans.json`)
                ]);

                dbKeys = await keysRes.json() || {};
                dbBans = await bansRes.json() || {};

                renderKeys();
                renderBans();

                if(icon) setTimeout(() => icon.style.transform = "", 300);
            } catch (err) {
                alert("Error connecting to Firebase: " + err.message);
            }
        }

        // ================= KEYS MANANGEMENT ================= //

        function formatTime(unixSeconds) {
            if (!unixSeconds || unixSeconds === 0) return "Never";
            const date = new Date(unixSeconds * 1000);
            return date.toLocaleString();
        }

        function renderKeys() {
            const tbody = document.getElementById('keysTableBody');
            tbody.innerHTML = "";
            let count = 0;
            const now = Math.floor(Date.now() / 1000);

            // Sort so newest are top
            const entries = Object.entries(dbKeys).sort((a,b) => (b[1].createdAt || 0) - (a[1].createdAt || 0));

            for(const [keyName, data] of entries) {
                count++;
                
                let isLifetime = data.type === 'Lifetime';
                let isExpired = !isLifetime && data.expiresAt > 0 && data.expiresAt < now;
                
                let statusHtml = "";
                if (isLifetime) statusHtml = `<div class="status-badge status-lifetime"><i data-lucide="award" style="width:12px;height:12px"></i> Lifetime</div>`;
                else if (isExpired) statusHtml = `<div class="status-badge status-expired"><i data-lucide="clock" style="width:12px;height:12px"></i> Expired</div>`;
                else statusHtml = `<div class="status-badge status-active"><i data-lucide="check-circle-2" style="width:12px;height:12px"></i> Active (4h)</div>`;

                tbody.innerHTML += `
                    <tr class="row-hover">
                        <td><span class="key-text">${keyName}</span></td>
                        <td>${statusHtml}</td>
                        <td style="font-family:monospace; color:var(--text-muted);">${data.hwid || 'Any'}</td>
                        <td>${formatTime(data.createdAt)}</td>
                        <td>${isLifetime ? '∞' : formatTime(data.expiresAt)}</td>
                        <td>${formatTime(data.lastLogin)}</td>
                        <td class="action-cell">
                            ${(!isLifetime && !isExpired) ? `
                                <button class="btn btn-outline" style="padding: 6px 12px; font-size:12px;" onclick="extendKey('${keyName}', ${data.expiresAt})" title="Add 2 Hours">
                                    <i data-lucide="clock-4" style="width: 14px; height: 14px;"></i> Extend
                                </button>
                            ` : ''}
                            <button class="btn btn-danger" style="padding: 6px 12px;" onclick="deleteKey('${keyName}')" title="Delete">
                                <i data-lucide="trash-2" style="width: 14px; height: 14px;"></i>
                            </button>
                        </td>
                    </tr>
                `;
            }

            document.getElementById('totalKeys').innerText = count;
            lucide.createIcons();
        }

        async function createCustomKey() {
            const input = document.getElementById('newKeyInput');
            const keyName = input.value.trim();
            if(!keyName) return;

            const payload = {
                type: "Lifetime",
                hwid: "Any",
                createdAt: Math.floor(Date.now() / 1000),
                expiresAt: 0,
                lastLogin: 0
            };

            await fetch(`${DB_URL}/keys/${keyName}.json`, {
                method: 'PUT',
                body: JSON.stringify(payload)
            });

            input.value = "";
            fetchData();
        }

        async function deleteKey(keyName) {
            if(confirm(`Are you sure you want to delete ${keyName}? They will be logged out eventually.`)) {
                await fetch(`${DB_URL}/keys/${keyName}.json`, { method: 'DELETE' });
                fetchData();
            }
        }

        async function extendKey(keyName, currentExpiry) {
            const additionalSeconds = 7200; // 2 hours
            const newExpiry = currentExpiry + additionalSeconds;
            await fetch(`${DB_URL}/keys/${keyName}.json`, {
                method: 'PATCH',
                body: JSON.stringify({ expiresAt: newExpiry })
            });
            fetchData();
        }

        // ================= BANS MANANGEMENT ================= //

        function renderBans() {
            const tbody = document.getElementById('bansTableBody');
            tbody.innerHTML = "";
            let count = 0;

            // Sort
            const entries = Object.entries(dbBans).sort((a,b) => (b[1].timestamp || 0) - (a[1].timestamp || 0));

            for(const [hwid, data] of entries) {
                count++;
                tbody.innerHTML += `
                    <tr class="row-hover">
                        <td><span class="key-text">${hwid}</span></td>
                        <td>${data.reason || 'Admin Ban'}</td>
                        <td>${formatTime(data.timestamp)}</td>
                        <td class="action-cell">
                            <button class="btn btn-outline" style="color:var(--success); border-color: rgba(16,185,129,0.3); padding: 6px 12px; font-size:12px;" onclick="unbanHardware('${hwid}')">
                                <i data-lucide="shield-check" style="width: 14px; height: 14px;"></i> Unban
                            </button>
                        </td>
                    </tr>
                `;
            }

            document.getElementById('totalBans').innerText = count;
            lucide.createIcons();
        }

        async function banHardware() {
            const input = document.getElementById('newBanInput');
            const hwid = input.value.trim();
            if(!hwid) return;

            const payload = {
                reason: "Manual Dashboard Ban",
                timestamp: Math.floor(Date.now() / 1000)
            };

            await fetch(`${DB_URL}/bans/${hwid}.json`, {
                method: 'PUT',
                body: JSON.stringify(payload)
            });

            input.value = "";
            fetchData();
        }

        async function unbanHardware(hwid) {
            if(confirm(`Remove ban for ${hwid}?`)) {
                await fetch(`${DB_URL}/bans/${hwid}.json`, { method: 'DELETE' });
                fetchData();
            }
        }
    </script>
</body>
</html>

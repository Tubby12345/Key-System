<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tubby Admin Panel</title>
    <!-- Modern premium font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #09090b;
            --surface: rgba(24, 24, 27, 0.6);
            --surface-glass: rgba(39, 39, 42, 0.4);
            --primary: #9333ea;
            --primary-hover: #7e22ce;
            --danger: #e11d48;
            --danger-hover: #be123c;
            --success: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.08);
            --border-highlight: rgba(147, 51, 234, 0.5);
            --radius-lg: 16px;
            --radius-md: 10px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
            /* Cool subtle background gradient */
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(147, 51, 234, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 85% 30%, rgba(37, 99, 235, 0.08) 0%, transparent 40%);
            background-attachment: fixed;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: none; /* hidden until auth */
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* HEADER */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #9333ea, #3b82f6);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(147, 51, 234, 0.4);
        }

        .brand-text h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .brand-text p {
            font-size: 13px;
            color: var(--text-muted);
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        /* BUTTONS */
        .btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s ease;
            color: white;
            outline: none;
        }
        
        .btn:active { transform: scale(0.96); }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #6b21a8);
            box-shadow: 0 4px 15px rgba(147, 51, 234, 0.3);
        }
        .btn-primary:hover { opacity: 0.9; box-shadow: 0 6px 20px rgba(147, 51, 234, 0.4); }

        .btn-outline {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
        }
        .btn-outline:hover { background: rgba(255, 255, 255, 0.08); }

        .btn-danger { background-color: rgba(225, 29, 72, 0.1); color: var(--danger); border: 1px solid rgba(225, 29, 72, 0.2); }
        .btn-danger:hover { background-color: var(--danger); color: white; }

        .btn-icon-only { padding: 8px; border-radius: 8px; }

        /* MULTI-COLUMN LAYOUT */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        /* CARDS */
        .card {
            background: var(--surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .card-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge {
            background: rgba(255,255,255,0.1);
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .card-body {
            padding: 20px;
            flex-grow: 1;
        }

        /* FORMS */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .input-box {
            flex-grow: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            color: white;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }
        .input-box:focus { border-color: var(--primary); }

        /* LISTS */
        .entry-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .entry-list::-webkit-scrollbar { width: 6px; }
        .entry-list::-webkit-scrollbar-track { background: transparent; }
        .entry-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .entry-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface-glass);
            border: 1px solid transparent;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            transition: all 0.2s;
        }
        .entry-item:hover {
            border-color: rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.03);
            transform: translateX(2px);
        }

        .entry-text {
            font-family: monospace;
            font-size: 14px;
            color: #e2e8f0;
            word-break: break-all;
            padding-right: 15px;
        }

        /* LOGIN OVERLAY */
        #authOverlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        
        .auth-card {
            background: var(--bg-color);
            border: 1px solid var(--border-highlight);
            box-shadow: 0 10px 40px rgba(147, 51, 234, 0.2);
            padding: 40px;
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .auth-card h2 { margin-bottom: 25px; }

        .auth-card .input-box {
            width: 100%;
            margin-bottom: 15px;
            text-align: center;
        }

        /* RESPONSIVE (MOBILE) */
        @media (max-width: 768px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            header { flex-direction: column; gap: 15px; align-items: flex-start; }
            .header-actions { width: 100%; justify-content: space-between; }
            .btn { flex-grow: 1; justify-content: center; }
        }
    </style>
</head>
<body>

    <!-- AUTHENTICATION OVERLAY -->
    <div id="authOverlay">
        <div class="auth-card">
            <div class="brand-icon" style="margin: 0 auto 20px auto;">
                <i data-lucide="lock" style="color: white; width: 24px; height: 24px;"></i>
            </div>
            <h2>Admin Login</h2>
            <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 20px;">
                Securely connects to GitHub using your personal access token. Data is only stored on your local device.
            </p>
            
            <input type="password" id="ghTokenInput" class="input-box" placeholder="GitHub PAT (ghp_...)">
            <input type="text" id="gistIdInput" class="input-box" placeholder="Gist ID (e.g. 5f2a1b...)">
            
            <button class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 10px;" onclick="saveAuth()">
                Connect to Dashboard
            </button>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div class="container" id="dashboardContainer">
        <header>
            <div class="brand">
                <div class="brand-icon">
                    <i data-lucide="shield" style="color: white; width: 24px; height: 24px;"></i>
                </div>
                <div class="brand-text">
                    <h1>Tubby Management</h1>
                    <p id="statusText">Connected to GitHub Gist</p>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn btn-primary" id="syncBtn" onclick="syncToCloud()">
                    <i data-lucide="cloud-upload" style="width: 18px; height: 18px;"></i>
                    <span id="syncText">Push Changes to Cloud</span>
                </button>
                <button class="btn btn-outline btn-icon-only" onclick="logout()" title="Logout">
                    <i data-lucide="log-out" style="width: 18px; height: 18px; color: var(--text-muted);"></i>
                </button>
            </div>
        </header>

        <div class="dashboard-grid">
            
            <!-- BANNED HWIDS CARD -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">
                        <i data-lucide="ban" style="color: var(--danger); width: 18px; height: 18px;"></i>
                        Banned Hardware
                    </div>
                    <span class="badge" id="banCount">0</span>
                </div>
                <div class="card-body">
                    <div class="input-group">
                        <input type="text" id="newBanInput" class="input-box" placeholder="Paste HWID to ban...">
                        <button class="btn btn-outline" style="color: var(--danger); border-color: rgba(225,29,72,0.3);" onclick="addBan()">Ban</button>
                    </div>
                    <ul class="entry-list" id="banListUI">
                        <!-- Populated by JS -->
                    </ul>
                </div>
            </div>

            <!-- LIFETIME KEYS CARD -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">
                        <i data-lucide="key" style="color: var(--success); width: 18px; height: 18px;"></i>
                        Custom Licenses
                    </div>
                    <span class="badge" id="keyCount">0</span>
                </div>
                <div class="card-body">
                    <div class="input-group">
                        <input type="text" id="newKeyInput" class="input-box" placeholder="Custom Key (e.g. VIP-123)">
                        <button class="btn btn-outline" style="color: var(--success); border-color: rgba(16,185,129,0.3);" onclick="addKey()">Create</button>
                    </div>
                    <ul class="entry-list" id="keyListUI">
                        <!-- Populated by JS -->
                    </ul>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Initialize lucide icons
        lucide.createIcons();

        // State
        let ghToken = localStorage.getItem('tubby_admin_token') || '';
        let gistId = localStorage.getItem('tubby_admin_gist') || '';
        
        // Data arrays
        let bannedHWIDs = [];
        let customKeys = [];

        // Elements
        const authOverlay = document.getElementById('authOverlay');
        const dashboardContainer = document.getElementById('dashboardContainer');
        const banListUI = document.getElementById('banListUI');
        const keyListUI = document.getElementById('keyListUI');
        
        // Check Auth on load
        if (ghToken && gistId) {
            authOverlay.style.display = 'none';
            dashboardContainer.style.display = 'block';
            fetchRemoteData();
        } else {
            // Wait for user payload
        }

        function saveAuth() {
            const tokenIn = document.getElementById('ghTokenInput').value.trim();
            const gistIn = document.getElementById('gistIdInput').value.trim();
            if (tokenIn && gistIn) {
                localStorage.setItem('tubby_admin_token', tokenIn);
                localStorage.setItem('tubby_admin_gist', gistIn);
                ghToken = tokenIn; gistId = gistIn;
                
                authOverlay.style.display = 'none';
                dashboardContainer.style.display = 'block';
                fetchRemoteData();
            } else {
                alert("Please enter both Token and Gist ID");
            }
        }

        function logout() {
            localStorage.removeItem('tubby_admin_token');
            localStorage.removeItem('tubby_admin_gist');
            location.reload();
        }

        // ================= API OPERATIONS =================

        async function fetchRemoteData() {
            const statusText = document.getElementById('statusText');
            statusText.innerText = "Fetching data from GitHub...";
            statusText.style.color = "var(--text-muted)";

            try {
                const response = await fetch(`https://api.github.com/gists/${gistId}`, {
                    headers: { 'Authorization': `token ${ghToken}` }
                });

                if (!response.ok) throw new Error("GitHub Auth Failed! Check Token/Gist ID.");

                const data = await response.json();
                
                // Assuming the Gist has a file named tubby_rules.txt (or fallback to the first file)
                let rulesContent = "";
                const files = Object.values(data.files);
                if (files.length > 0) rulesContent = files[0].content;

                parseRules(rulesContent);
                renderLists();
                
                statusText.innerText = "Live - Connected to GitHub";
                statusText.style.color = "var(--success)";

            } catch (err) {
                statusText.innerText = "Error: " + err.message;
                statusText.style.color = "var(--danger)";
                setTimeout(logout, 3000); // Kick to login if token is dead
            }
        }

        async function syncToCloud() {
            const syncBtn = document.getElementById('syncBtn');
            const syncText = document.getElementById('syncText');
            
            syncBtn.style.opacity = "0.7";
            syncText.innerText = "Pushing...";

            // Rebuild string
            let newContent = "";
            bannedHWIDs.forEach(h => newContent += `BANNED: ${h}\n`);
            customKeys.forEach(k => newContent += `CUSTOM: ${k}\n`);

            if (newContent === "") newContent = "// Empty rules\n"; // Gists can't be purely empty easily

            try {
                // Get the actual filename existing on the gist to update it properly
                const getResp = await fetch(`https://api.github.com/gists/${gistId}`, {
                    headers: { 'Authorization': `token ${ghToken}` }
                });
                const data = await getResp.json();
                const filename = Object.keys(data.files)[0]; // Just use whatever the first file is named

                const patchPayload = {
                    files: {
                        [filename]: { content: newContent }
                    }
                };

                const patchResp = await fetch(`https://api.github.com/gists/${gistId}`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `token ${ghToken}`,
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify(patchPayload)
                });

                if (patchResp.ok) {
                    syncText.innerText = "Synced Successfully!";
                    syncBtn.style.background = "var(--success)";
                    setTimeout(() => {
                        syncBtn.style.background = "";
                        syncText.innerText = "Push Changes to Cloud";
                    }, 2000);
                } else {
                    throw new Error("Failed to patch Gist");
                }
            } catch (err) {
                alert("Error pushing to cloud: " + err.message);
                syncText.innerText = "Sync Failed";
                syncBtn.style.background = "var(--danger)";
            }
            
            syncBtn.style.opacity = "1";
        }

        // ================= LOGIC & UI =================

        function parseRules(text) {
            bannedHWIDs = [];
            customKeys = [];
            
            const lines = text.split('\n');
            for(let line of lines) {
                line = line.trim();
                if (line.startsWith("BANNED:")) {
                    bannedHWIDs.push(line.replace("BANNED:", "").trim());
                } else if (line.startsWith("CUSTOM:")) {
                    customKeys.push(line.replace("CUSTOM:", "").trim());
                }
            }
        }

        function renderLists() {
            // Update Counts
            document.getElementById('banCount').innerText = bannedHWIDs.length;
            document.getElementById('keyCount').innerText = customKeys.length;

            // Render Bans
            banListUI.innerHTML = "";
            bannedHWIDs.forEach((hwid, idx) => {
                banListUI.innerHTML += `
                    <li class="entry-item">
                        <span class="entry-text">${hwid}</span>
                        <button class="btn btn-danger btn-icon-only" onclick="removeBan(${idx})" title="Unban">
                            <i data-lucide="trash-2" style="width: 14px; height: 14px;"></i>
                        </button>
                    </li>
                `;
            });

            // Render Keys
            keyListUI.innerHTML = "";
            customKeys.forEach((k, idx) => {
                keyListUI.innerHTML += `
                    <li class="entry-item">
                        <span class="entry-text">${k}</span>
                        <button class="btn btn-outline btn-icon-only" style="color:var(--danger); border-color: rgba(225,29,72,0.2)" onclick="removeKey(${idx})" title="Delete Key">
                            <i data-lucide="x" style="width: 14px; height: 14px;"></i>
                        </button>
                    </li>
                `;
            });

            lucide.createIcons(); // re-init icons for dynamic elements
        }

        function addBan() {
            const input = document.getElementById('newBanInput');
            const val = input.value.trim();
            if (val && !bannedHWIDs.includes(val)) {
                bannedHWIDs.push(val);
                input.value = "";
                renderLists();
            }
        }

        function removeBan(idx) {
            bannedHWIDs.splice(idx, 1);
            renderLists();
        }

        function addKey() {
            const input = document.getElementById('newKeyInput');
            const val = input.value.trim();
            if (val && !customKeys.includes(val)) {
                customKeys.push(val);
                input.value = "";
                renderLists();
            }
        }

        function removeKey(idx) {
            customKeys.splice(idx, 1);
            renderLists();
        }

    </script>
</body>
</html>
